<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FCMOLT</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

#terminal{
position:absolute;
top:0;
left:0;
width:100%;
height:40px;
background:#111;
display:flex;
align-items:center;
padding-left:15px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:8px;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

#title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#aaa;
font-size:14px;
}

#x{
position:absolute;
top:10px;
right:20px;
color:white;
text-decoration:none;
opacity:0.8;
}
</style>
</head>

<body>

<div id="terminal">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<div id="title">FCMOLT / Lobster Engine</div>
<a id="x" href="https://x.com/derionhq">@derionhq</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 4

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

renderer.domElement.style.marginTop="40px"

const group = new THREE.Group()

// body
const body = new THREE.SphereGeometry(1,64,64)
const mat = new THREE.MeshStandardMaterial({
color:0xff00aa,
emissive:0xaa0077,
metalness:1,
roughness:0.2
})

const bodyMesh = new THREE.Mesh(body,mat)
group.add(bodyMesh)

// claws
for(let i=0;i<2;i++){

const clawGeo = new THREE.ConeGeometry(0.3,1,32)
const claw = new THREE.Mesh(clawGeo,mat)

claw.position.x = i===0 ? -1.2 : 1.2
claw.position.y = 0.4
claw.rotation.z = i===0 ? -1 : 1

group.add(claw)

}

scene.add(group)

const light = new THREE.PointLight(0xff00cc,3)
light.position.set(5,5,5)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,1))

function animate(){

requestAnimationFrame(animate)

group.rotation.y += 0.01
group.rotation.x += 0.003

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
