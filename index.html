<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FCMOLT</title>
<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,Helvetica,sans-serif;
}

#logo{
position:absolute;
top:20px;
left:20px;
color:#ff4da6;
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

#x{
position:absolute;
top:20px;
right:20px;
color:white;
font-size:16px;
opacity:0.8;
text-decoration:none;
}

#x:hover{
opacity:1;
}
</style>
</head>
<body>

<div id="logo">FCMOLT</div>
<a id="x" href="https://x.com/derionhq" target="_blank">@derionhq</a>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 4

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const light = new THREE.PointLight(0xff44cc,3)
light.position.set(5,5,5)
scene.add(light)

const light2 = new THREE.AmbientLight(0xffffff,1)
scene.add(light2)

const loader = new THREE.GLTFLoader()

// lobster 3D model (free CDN example)
loader.load(
"https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lobster/glTF/Lobster.gltf",
function(gltf){

const lobster = gltf.scene

lobster.scale.set(1.5,1.5,1.5)

lobster.traverse((child)=>{
if(child.isMesh){
child.material.color.set(0xff00cc)
child.material.emissive = new THREE.Color(0xaa0077)
child.material.emissiveIntensity = 0.8
}
})

scene.add(lobster)

function animate(){
requestAnimationFrame(animate)

lobster.rotation.y += 0.01
lobster.rotation.x += 0.003

renderer.render(scene,camera)
}

animate()

}
)

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)
})

</script>

</body>
</html>
