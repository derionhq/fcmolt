<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FCMOLT</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

#terminal{
position:absolute;
top:0;
left:0;
width:100%;
height:40px;
background:#111;
display:flex;
align-items:center;
padding-left:15px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:8px;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

#title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#aaa;
font-size:14px;
}

#x{
position:absolute;
top:10px;
right:20px;
color:white;
text-decoration:none;
opacity:0.7;
font-size:14px;
}

</style>
</head>

<body>

<div id="terminal">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<div id="title">FCMOLT / Lobster Engine</div>

<a id="x" href="https://x.com/derionhq">@derionhq</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 3

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

renderer.domElement.style.marginTop="40px"

const geometry = new THREE.TorusKnotGeometry(0.9,0.35,200,32)

const material = new THREE.MeshStandardMaterial({
color:0xff00aa,
emissive:0xaa0077,
metalness:1,
roughness:0.25
})

const mesh = new THREE.Mesh(geometry,material)

scene.add(mesh)

const light1 = new THREE.PointLight(0xff00aa,3)
light1.position.set(5,5,5)
scene.add(light1)

const ambient = new THREE.AmbientLight(0xffffff,0.6)
scene.add(ambient)

function animate(){

requestAnimationFrame(animate)

mesh.rotation.x += 0.01
mesh.rotation.y += 0.015

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
