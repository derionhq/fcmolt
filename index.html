<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FCMOLT</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

#terminal{
position:absolute;
top:0;
left:0;
width:100%;
height:40px;
background:#111;
display:flex;
align-items:center;
padding-left:15px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:8px;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

#title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#aaa;
font-size:14px;
}

#x{
position:absolute;
top:10px;
right:20px;
color:white;
text-decoration:none;
opacity:0.8;
}
</style>
</head>

<body>

<div id="terminal">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div id="title">FCMOLT / Lobster Engine</div>
<a id="x" href="https://x.com/derionhq">@derionhq</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 6

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

renderer.domElement.style.marginTop="40px"

const mat = new THREE.MeshStandardMaterial({
color:0xff00aa,
emissive:0xaa0077,
metalness:1,
roughness:0.2
})

const lobster = new THREE.Group()

// body
const body = new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
mat
)
lobster.add(body)

// tail
const tail = new THREE.Mesh(
new THREE.CylinderGeometry(0.4,0.8,1.5,32),
mat
)
tail.position.y = -1.2
lobster.add(tail)

// claws
const claw1 = new THREE.Mesh(
new THREE.BoxGeometry(0.3,1.2,0.3),
mat
)
claw1.position.set(-1.3,0.3,0)

const claw2 = claw1.clone()
claw2.position.x = 1.3

lobster.add(claw1)
lobster.add(claw2)

scene.add(lobster)

const light = new THREE.PointLight(0xff00cc,3)
light.position.set(5,5,5)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,1))

function animate(){

requestAnimationFrame(animate)

lobster.rotation.y += 0.01
lobster.rotation.x += 0.002

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
