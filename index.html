<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FCMOLT</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

#terminal{
position:absolute;
top:0;
left:0;
width:100%;
height:40px;
background:#111;
display:flex;
align-items:center;
padding-left:15px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:8px;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

#title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#aaa;
font-size:14px;
}

#x{
position:absolute;
top:10px;
right:20px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div id="terminal">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div id="title">FCMOLT / Lobster Engine</div>
<a id="x" href="https://x.com/derionhq">@derionhq</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 7

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

renderer.domElement.style.marginTop="40px"

const mat = new THREE.MeshStandardMaterial({
color:0xff00aa,
emissive:0xaa0077,
metalness:1,
roughness:0.3
})

const lobster = new THREE.Group()

// body segments
for(let i=0;i<5;i++){
const seg = new THREE.Mesh(
new THREE.SphereGeometry(0.7-i*0.08,32,32),
mat
)
seg.position.y = -i*0.6
lobster.add(seg)
}

// tail
const tail = new THREE.Mesh(
new THREE.ConeGeometry(0.5,1.5,32),
mat
)
tail.position.y = -3
tail.rotation.x = Math.PI
lobster.add(tail)

// claws
const clawGeo = new THREE.CylinderGeometry(0.1,0.2,2,16)

const clawL = new THREE.Mesh(clawGeo,mat)
clawL.position.set(-1.5,0.5,0)
clawL.rotation.z = 0.7

const clawR = clawL.clone()
clawR.position.x = 1.5
clawR.rotation.z = -0.7

lobster.add(clawL)
lobster.add(clawR)

scene.add(lobster)

const light = new THREE.PointLight(0xff00cc,3)
light.position.set(5,5,5)
scene.add(light)

scene.add(new THREE.AmbientLight(0xffffff,1))

let rotX=0
let rotY=0
let dragging=false
let prevX=0
let prevY=0

document.addEventListener("mousedown",e=>{
dragging=true
prevX=e.clientX
prevY=e.clientY
})

document.addEventListener("mouseup",()=>{
dragging=false
})

document.addEventListener("mousemove",e=>{
if(dragging){
rotY += (e.clientX-prevX)*0.01
rotX += (e.clientY-prevY)*0.01
prevX=e.clientX
prevY=e.clientY
}
})

document.addEventListener("touchstart",e=>{
prevX=e.touches[0].clientX
prevY=e.touches[0].clientY
})

document.addEventListener("touchmove",e=>{
rotY += (e.touches[0].clientX-prevX)*0.01
rotX += (e.touches[0].clientY-prevY)*0.01
prevX=e.touches[0].clientX
prevY=e.touches[0].clientY
})

function animate(){

requestAnimationFrame(animate)

lobster.rotation.y = rotY
lobster.rotation.x = rotX

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
