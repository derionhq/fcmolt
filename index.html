<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DeepCore</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

/* terminal bar */
#terminal{
position:fixed;
top:0;
left:0;
width:100%;
height:42px;
background:#111;
display:flex;
align-items:center;
padding-left:14px;
z-index:10;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:8px;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

#title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#aaa;
font-size:14px;
}

#x{
position:absolute;
right:20px;
color:white;
text-decoration:none;
}

model-viewer{
width:100%;
height:100vh;
background:black;
}
</style>
</head>

<body>

<div id="terminal">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<div id="title">DeepCore</div>

<a id="farcaster" href="https://farcaster.xyz/derion.eth">@derion.eth</a>
</div>

<!-- 3D Model -->
<model-viewer
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
auto-rotate
camera-controls
exposure="1"
shadow-intensity="1"
style="background: radial-gradient(circle at center, #02020a, #000000);">
</model-viewer>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<script>

/* create stars */
const starCount = 200

for(let i=0;i<starCount;i++){

const star = document.createElement("div")

star.style.position="fixed"
star.style.width="2px"
star.style.height="2px"
star.style.background="white"
star.style.top=Math.random()*100+"vh"
star.style.left=Math.random()*100+"vw"
star.style.opacity=Math.random()

document.body.appendChild(star)

}

</script>

</body>
</html>
