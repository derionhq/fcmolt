<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FCMOLT</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

/* terminal bar */
#terminal{
position:fixed;
top:0;
left:0;
width:100%;
height:42px;
background:#111;
display:flex;
align-items:center;
padding-left:14px;
z-index:10;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:8px;
}

.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

#title{
position:absolute;
left:50%;
transform:translateX(-50%);
color:#aaa;
font-size:14px;
}

#x{
position:absolute;
right:20px;
color:white;
text-decoration:none;
}

/* model viewer */
model-viewer{
width:100%;
height:100vh;
background:black;
}

</style>
</head>

<body>

<div id="terminal">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<div id="title">FCMOLT / Lobster Engine</div>

<a id="x" href="https://x.com/derionhq">@derionhq</a>
</div>

<model-viewer
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
auto-rotate
camera-controls>
</model-viewer>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</body>
</html>
